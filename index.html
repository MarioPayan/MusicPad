<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chord Pad</title>
</head>
<body>
  <h1>CHORD PAD</h1>
  <div class="now" id="now"><small>toca una nota para empezar</small></div>

  <div class="grid roots" id="roots"></div>
  <div class="grid quals" id="quals"></div>

  <div class="controls">
    <label>Octava <input type="range" id="oct" min="1" max="5" value="3"><span id="octv">3</span></label>
    <label>Volumen <input type="range" id="vol" min="-40" max="0" value="-8"></label>
    <label><input type="checkbox" id="latch"> Mantener (latch)</label>
  </div>
  <div class="hint">Elegí una raíz arriba, luego mantené presionado un acorde para que suene mientras cantás. Con <b>latch</b>, un toque lo deja sonando y otro lo apaga.</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
