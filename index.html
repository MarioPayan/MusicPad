<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16181d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MusicPad">
<link rel="icon" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>MusicPad</title>
</head>
<body>
  <div class="wheelwrap">
    <svg id="chordWheel" viewBox="0 0 100 100" aria-label="Chord wheel">
      <g id="chordHubGroup">
        <circle cx="50" cy="50" r="11.5" class="hub-bg"></circle>
        <text id="chordHub" x="50" y="50" dy="0.34em">♪</text>
      </g>
    </svg>
  </div>

  <div class="rcol" id="rcol">
    <div class="rtrack" id="rtrack">
      <div class="rpanel">
        <svg id="altWheel" viewBox="0 0 100 100" aria-label="Alteration wheel">
          <g id="altHubGroup">
            <circle cx="50" cy="50" r="11.5" class="hub-bg"></circle>
            <text id="altHub" x="50" y="48" dy="0.34em">—</text>
            <text class="hub-cap" x="50" y="56" dy="0.34em">alt</text>
          </g>
        </svg>
      </div>
      <div class="rpanel">
        <svg id="notesWheel" viewBox="0 0 100 100" aria-label="Note wheel">
          <g id="notesHubGroup">
            <circle cx="50" cy="50" r="11.5" class="hub-bg"></circle>
            <text id="notesHub" x="50" y="48" dy="0.34em">♪</text>
            <text class="hub-cap" x="50" y="56" dy="0.34em">melody</text>
          </g>
        </svg>
      </div>
    </div>
    <div class="pagedots" id="pagedots"><span class="dot on"></span><span class="dot"></span></div>
  </div>

  <button class="gear" id="gear" aria-label="Settings">⚙</button>

  <div class="settings" id="settings" hidden>
    <div class="panel">
      <div class="panel-head"><b>Settings</b><button class="gear" id="close" aria-label="Close">✕</button></div>

      <label>Instrument
        <select id="inst">
          <option value="pad">Pad</option>
          <option value="strings">Strings</option>
          <option value="organ">Organ</option>
          <option value="epiano">E-Piano</option>
          <option value="pluck">Pluck</option>
          <option value="bell">Bell</option>
        </select>
      </label>
      <label>Octave <input type="range" id="oct" min="1" max="5" value="3"><span id="octv" class="val">3</span></label>
      <label>Capo <input type="range" id="capo" min="-7" max="7" step="1" value="0"><span id="capov" class="val">0</span></label>
      <label>Attack <input type="range" id="atk" min="0.005" max="0.4" step="0.005" value="0.07"></label>
      <label>Brightness <input type="range" id="bright" min="300" max="8000" step="50" value="2200"></label>
      <label>Reverb <input type="range" id="rev" min="0" max="0.6" step="0.02" value="0.18"></label>
      <label>Volume <input type="range" id="vol" min="-40" max="0" value="-16"></label>
      <label class="check"><input type="checkbox" id="strum"> Strum</label>

      <div class="row">
        <label>Key
          <select id="keyRoot">
            <option value="-1">Off</option>
            <option value="0">C</option><option value="1">C#</option><option value="2">D</option>
            <option value="3">D#</option><option value="4">E</option><option value="5">F</option>
            <option value="6">F#</option><option value="7">G</option><option value="8">G#</option>
            <option value="9">A</option><option value="10">A#</option><option value="11">B</option>
          </select>
        </label>
        <label>Scale
          <select id="scale">
            <option value="major">Major</option>
            <option value="minor">Minor</option>
          </select>
        </label>
      </div>

      <label class="check"><input type="checkbox" id="latch"> Hold (latch)</label>
      <p class="hint">Left wheel = chords: outer ring majors, inner ring minors. Right wheel: hold an alteration to colour the chord you're already holding (release to revert); swipe up for a melody page of single notes.</p>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
